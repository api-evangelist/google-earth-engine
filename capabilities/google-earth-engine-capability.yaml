naftiko: 1.0.0-alpha2
info:
  label: Google Earth Engine REST API
  description: The Google Earth Engine REST API provides programmatic access to Earth Engine's planetary-scale geospatial
    analysis capabilities. You can manage projects, compute satellite imagery analysis, export data, work with image collections,
    feature collections, and perform large-scale geospatial computations.
  tags:
  - Google
  - Earth
  - Engine
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: google-earth-engine
    baseUri: https://earthengine.googleapis.com/v1
    description: Google Earth Engine REST API HTTP API.
    authentication:
      type: bearer
      token: '{{GOOGLE_EARTH_ENGINE_TOKEN}}'
    resources:
    - name: projects-project-assets
      path: /projects/{project}/assets
      operations:
      - name: listassets
        method: GET
        description: List assets
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        - name: pageSize
          in: query
          type: integer
        - name: pageToken
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: projects-project-assets-assetid
      path: /projects/{project}/assets/{assetId}
      operations:
      - name: getasset
        method: GET
        description: Get an asset
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        - name: assetId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteasset
        method: DELETE
        description: Delete an asset
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        - name: assetId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: projects-project-image-computepixels
      path: /projects/{project}/image:computePixels
      operations:
      - name: computepixels
        method: POST
        description: Compute pixels
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: projects-project-image-export
      path: /projects/{project}/image:export
      operations:
      - name: exportimage
        method: POST
        description: Export an image
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: projects-project-table-computefeatures
      path: /projects/{project}/table:computeFeatures
      operations:
      - name: computefeatures
        method: POST
        description: Compute features
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
