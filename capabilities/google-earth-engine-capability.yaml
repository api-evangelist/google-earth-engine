        - name: result
          type: object
          value: $.
    - name: projects-project-operations-operationid
      path: /projects/{project}/operations/{operationId}
      operations:
      - name: getoperation
        method: GET
        description: Get an operation
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        - name: operationId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: google-earth-engine-rest
    description: REST adapter for Google Earth Engine REST API.
    resources:
    - path: /projects/{project}/assets
      name: listassets
      operations:
      - method: GET
        name: listassets
        description: List assets
        call: google-earth-engine.listassets
        with:
          project: rest.project
        outputParameters:
        - type: object
          mapping: $.
    - path: /projects/{project}/assets/{assetId}
      name: getasset
      operations:
      - method: GET
        name: getasset
        description: Get an asset
        call: google-earth-engine.getasset
        with:
          project: rest.project
          assetId: rest.assetId
        outputParameters:
        - type: object
          mapping: $.
    - path: /projects/{project}/assets/{assetId}
      name: deleteasset
      operations:
      - method: DELETE
        name: deleteasset
        description: Delete an asset
        call: google-earth-engine.deleteasset
        with:
          project: rest.project
          assetId: rest.assetId
        outputParameters:
        - type: object
          mapping: $.
