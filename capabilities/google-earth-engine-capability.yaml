        description: Export a table
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: projects-project-value-compute
      path: /projects/{project}/value:compute
      operations:
      - name: computevalue
        method: POST
        description: Compute a value
        inputParameters:
        - name: project
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: projects-project-maps
      path: /projects/{project}/maps
      operations:
      - name: createmap
        method: POST
        description: Create a map
        inputParameters:
        - name: project
          in: path
