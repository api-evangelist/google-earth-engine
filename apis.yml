aid: google-earth-engine
name: Google Earth Engine REST
description: >-
  The Google Earth Engine REST API provides programmatic access to Earth Engine's
  planetary-scale geospatial analysis platform. You can manage geospatial assets,
  compute satellite imagery analysis, export images and tables, create map
  visualizations, and perform large-scale environmental and geospatial
  computations using petabytes of satellite imagery and geospatial datasets.
