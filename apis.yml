    description: >-
      The Earth Engine REST API provides access to Google's geospatial analysis
      platform. Manage assets, compute imagery, export data, and create map
      tiles for visualization of satellite and geospatial datasets.
    humanURL: https://developers.google.com/earth-engine
    baseURL: https://earthengine.googleapis.com/v1
